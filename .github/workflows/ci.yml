name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck, tests, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run build

  rust-core:
    name: Rust core (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: rustfmt (whole workspace)
        run: cargo fmt --check
        working-directory: src-tauri
      - name: clippy (core crate)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri/core
      - name: tests (core crate)
        run: cargo test
        working-directory: src-tauri/core

  windows-app:
    name: Windows app (build + installer)
    runs-on: windows-latest
    needs: [frontend, rust-core]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # shared with the release workflow: a tag build restores the warm
          # cache produced by pushes to main instead of compiling ~450
          # release-profile crates from scratch
          shared-key: windows-app
      - run: npm ci
      - name: Build Tauri app and installers
        shell: bash
        env:
          # createUpdaterArtifacts needs the signing key at build time, but
          # forked PRs (and repos before the secrets exist) don't have it —
          # skip updater artifacts there instead of failing the build. The
          # release workflow always signs.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "no signing key available — building without updater artifacts"
            npx tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            npx tauri build
          fi
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: vault-buddy-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
