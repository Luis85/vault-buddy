name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PRs share one group per ref, so a new push to a PR cancels that PR's now
  # stale run (cancel-in-progress below). main pushes get a UNIQUE group per
  # commit (the SHA) so a burst of merges never cancels an earlier commit's
  # run. A shared main group would not be enough even with
  # cancel-in-progress: false: GitHub keeps only the latest *pending* run in a
  # group and cancels any earlier pending one, so a third merge while the first
  # run is still going would drop the middle commit's run — leaving it
  # unvalidated and shown red, the exact failure mode this avoids.
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend (lint, quality gates, typecheck, tests, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Quality gates (docs/DEVELOPMENT.md § Quality pipeline). Ordering
      # matters: check:quality must run while no coverage/ directory exists —
      # a stray coverage report flips fallow's complexity weighting from
      # static estimation to coverage-weighted CRAP — so test:coverage
      # (which creates coverage/) runs last.
      - run: npm run lint
      - run: npm run check:loc
      - run: npm run check:quality
      - run: npm run build
      - run: npm run test:coverage

  rust-core:
    name: Rust core (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: rustfmt (whole workspace)
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Install ALSA headers (cpal build dependency on Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: clippy (core + capture + transcribe crates)
        run: cargo clippy -p vault_buddy_core -p vault_buddy_capture -p vault_buddy_transcribe --all-targets -- -D warnings
        working-directory: src-tauri
      # `whisper` isn't a default feature (the real engine only builds where
      # whisper.cpp does), so the plain invocation above never compiles
      # engine.rs at all — including its FFI regression tests guarding the
      # whisper-rs abort-callback UB (#277) and callback-leak fixes. ubuntu-latest
      # ships cmake + clang, so whisper-rs-sys builds here too; this is the only
      # place those tests run (windows-app only runs `tauri build`, never `cargo
      # test`). `--all-targets` also compiles examples/transcribe_file.rs
      # (required-features = ["whisper"]) so that verification harness can't
      # silently bit-rot — it isn't run here (it needs a real model + audio
      # file), just proven to still build.
      - name: clippy (transcribe crate, whisper feature)
        run: cargo clippy -p vault_buddy_transcribe --all-targets --features whisper -- -D warnings
        working-directory: src-tauri
      - name: tests (core + capture + transcribe crates)
        run: cargo test -p vault_buddy_core -p vault_buddy_capture -p vault_buddy_transcribe
        working-directory: src-tauri
      - name: tests (transcribe crate, whisper feature)
        run: cargo test -p vault_buddy_transcribe --features whisper
        working-directory: src-tauri

  windows-app:
    name: Windows app (build + installer)
    runs-on: windows-latest
    needs: [frontend, rust-core]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # shared with the release workflow: a tag build restores the warm
          # cache produced by pushes to main instead of compiling ~450
          # release-profile crates from scratch
          shared-key: windows-app
      - run: npm ci
      - name: Build Tauri app and installers
        shell: bash
        env:
          # createUpdaterArtifacts needs the signing key at build time, but
          # forked PRs (and repos before the secrets exist) don't have it —
          # skip updater artifacts there instead of failing the build. The
          # release workflow always signs.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "no signing key available — building without updater artifacts"
            npx tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            npx tauri build
          fi
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: vault-buddy-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux-app:
    name: Linux app (compile gate)
    runs-on: ubuntu-latest
    needs: [frontend, rust-core]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: linux-app
      - name: Install Linux GUI/build system deps
        run: bash scripts/setup-linux-deps.sh
      - run: npm ci
      # Compile gate only: --no-bundle links the whole app and runs Tauri's
      # codegen + capability checks but produces no installer, and
      # createUpdaterArtifacts:false means no signing secret is referenced
      # (runs identically on forks). This closes the loop that previously only
      # the windows-app job could — a shell compile error now fails here, fast
      # and in parallel with Windows. The Linux build is never released.
      - name: Compile the Tauri shell (no bundle)
        run: npx tauri build --no-bundle --config '{"bundle":{"createUpdaterArtifacts":false}}'
