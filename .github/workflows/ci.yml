name: CI

# Least privilege: every job only reads the repo. Nothing in CI pushes,
# comments, or releases (GAP-36).
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PRs share one group per ref, so a new push to a PR cancels that PR's now
  # stale run (cancel-in-progress below). main pushes get a UNIQUE group per
  # commit (the SHA) so a burst of merges never cancels an earlier commit's
  # run. A shared main group would not be enough even with
  # cancel-in-progress: false: GitHub keeps only the latest *pending* run in a
  # group and cancels any earlier pending one, so a third merge while the first
  # run is still going would drop the middle commit's run — leaving it
  # unvalidated and shown red, the exact failure mode this avoids.
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend (lint, quality gates, typecheck, tests, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Quality gates (docs/DEVELOPMENT.md § Quality pipeline). Ordering
      # matters: check:quality must run while no coverage/ directory exists —
      # a stray coverage report flips fallow's complexity weighting from
      # static estimation to coverage-weighted CRAP — so test:coverage
      # (which creates coverage/) runs last.
      - run: npm run lint
      - run: npm run check:loc
      - run: npm run check:quality
      # The five version files must agree (package.json, tauri.conf.json,
      # Cargo.toml + both lockfiles) — drift used to surface only at the
      # next bump attempt (docs/Gaps.md GAP-44).
      - run: node scripts/bump-version.mjs --check
      - run: npm run build
      - run: npm run test:coverage

  rust-core:
    name: Rust core (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, pinned 2026-07-10
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - name: rustfmt (whole workspace)
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Install ALSA headers (cpal build dependency on Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      # mcp is listed explicitly like the others: the tauri-build jobs compile
      # it (the shell depends on it) but never run its TESTS — including the
      # real-socket round-trip suite that proves the guarded endpoint and the
      # shutdown property. Without this line those tests wouldn't run anywhere.
      - name: clippy (core + capture + transcribe + mcp crates)
        run: cargo clippy -p vault_buddy_core -p vault_buddy_capture -p vault_buddy_transcribe -p vault_buddy_mcp --all-targets -- -D warnings
        working-directory: src-tauri
      # `whisper` isn't a default feature (the real engine only builds where
      # whisper.cpp does), so the plain invocation above never compiles
      # engine.rs at all — including its FFI regression tests guarding the
      # whisper-rs abort-callback UB (#277) and callback-leak fixes. ubuntu-latest
      # ships cmake + clang, so whisper-rs-sys builds here too; this is the only
      # place those tests run (windows-app only runs `tauri build`, never `cargo
      # test`). `--all-targets` also compiles examples/transcribe_file.rs
      # (required-features = ["whisper"]) so that verification harness can't
      # silently bit-rot — it isn't run here (it needs a real model + audio
      # file), just proven to still build.
      - name: clippy (transcribe crate, whisper feature)
        run: cargo clippy -p vault_buddy_transcribe --all-targets --features whisper -- -D warnings
        working-directory: src-tauri
      - name: tests (core + capture + transcribe + mcp crates)
        run: cargo test -p vault_buddy_core -p vault_buddy_capture -p vault_buddy_transcribe -p vault_buddy_mcp
        working-directory: src-tauri
      - name: tests (transcribe crate, whisper feature)
        run: cargo test -p vault_buddy_transcribe --features whisper
        working-directory: src-tauri
      - name: Install Rust quality tools (machete + llvm-cov + deny, prebuilt)
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: cargo-machete,cargo-llvm-cov,cargo-deny
      - name: unused dependencies (cargo-machete)
        run: cargo machete src-tauri
      # Coverage floor over the pure member crates (default features — the
      # whisper FFI path is exercised by the dedicated test step above).
      # Rise-only ratchet, same policy as the frontend floors in
      # vite.config.ts: when coverage rises, raise the floor in the same PR;
      # lowering it is a reviewed decision. Floored from the 2026-07-10
      # adoption run (see docs/DEVELOPMENT.md § Quality pipeline).
      - name: coverage floor (core + capture + transcribe, cargo-llvm-cov)
        run: cargo llvm-cov -p vault_buddy_core -p vault_buddy_capture -p vault_buddy_transcribe --fail-under-lines 94
        working-directory: src-tauri
      # RustSec advisories + license/source policy (src-tauri/deny.toml).
      # Runs from src-tauri so the config is found by the same path as the
      # documented local invocation — no reliance on cargo-deny's implicit
      # config resolution from a manifest-path. The advisories DB is fetched
      # at run time, so a newly published CVE can fail this step on an
      # unchanged tree — that is the point of the gate.
      - name: dependency audit (cargo-deny)
        run: cargo deny check
        working-directory: src-tauri

  windows-app:
    name: Windows app (build + installer)
    runs-on: windows-latest
    needs: [frontend, rust-core]
    env:
      # whisper.cpp's Vulkan backend builds a nested vulkan-shaders-gen
      # ExternalProject whose MSBuild FileTracker .tlog paths overflow
      # Windows' 260-char MAX_PATH under the default deep cargo target dir
      # (FileTracker error FTK1011 in the compiler probe). A short
      # top-level target dir keeps every nested path under the limit. C:\
      # rather than D:\ — the runner's D: drive is only ~14 GB, and a
      # restored rust-cache archive alongside a release-profile Vulkan
      # build needs more headroom than that reliably leaves; C:\ (the OS
      # drive) has room to spare. tauri-action resolves the target dir
      # through cargo automatically, but rust-cache does NOT — left alone
      # it only caches its default `<workspace>/target`, so the
      # `cache-directories` input below points it at this same override.
      CARGO_TARGET_DIR: C:\vbt
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, pinned 2026-07-10
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # shared with the release workflow: a tag build restores the warm
          # cache produced by pushes to main instead of compiling ~450
          # release-profile crates from scratch
          shared-key: windows-app
          # rust-cache's own target-dir detection does not follow the
          # CARGO_TARGET_DIR override above — without this it caches (and
          # later finds nothing in) the default `src-tauri/target`, so
          # Windows artifact caching was silently a no-op while the real
          # build output sat in C:\vbt. Documented rust-cache input for
          # extra cache paths.
          cache-directories: C:\vbt
      - run: npm ci
      # GPU builds: whisper.cpp's Vulkan backend needs the SDK's headers +
      # glslc at compile time. Pinned version + SHA-256 (the same pinned-
      # download discipline as the app's own model downloads); ~2 min
      # install per run, accepted — revisit with a cache if it hurts.
      - name: Install Vulkan SDK (pinned)
        shell: bash
        run: |
          VK_VERSION="1.4.350.0"
          VK_SHA256="855b27ba05d2d8119c5114c5d4ff870ca38f2c632b11e1bb9923b9b7e6ecfe7b"
          curl -fsSL -o vulkan-sdk.exe "https://sdk.lunarg.com/sdk/download/${VK_VERSION}/windows/vulkansdk-windows-X64-${VK_VERSION}.exe"
          echo "${VK_SHA256}  vulkan-sdk.exe" | sha256sum -c -
          ./vulkan-sdk.exe --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:\\VulkanSDK\\${VK_VERSION}" >> "$GITHUB_ENV"
      - name: Build Tauri app and installers
        shell: bash
        env:
          # Signing material only on push builds (main): a same-repo PR
          # branch must not have the updater key in its environment while
          # running the branch's own npm ci / build.rs (GAP-36). Forked PRs
          # were already keyless; this makes ALL PR builds keyless. The
          # empty-key fallback below then skips updater artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ github.event_name == 'push' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ github.event_name == 'push' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "no signing key available — building without updater artifacts"
            npx tauri build --features gpu --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            npx tauri build --features gpu
          fi
      # The most platform-sensitive code (process detection, GetKeyState,
      # WASAPI loopback gates, MoveFileExW's non-replacing fallback, whisper
      # on MSVC) is Windows-only, yet this job was build-only — the
      # cfg(windows) tests never executed anywhere (GAP-43). These compile
      # the dev profile (the tauri build above is release-profile, a
      # different target/ subtree), so whisper.cpp rebuilds once for tests
      # — an accepted wall-clock cost, same trade the Linux rust-core job
      # makes for its own whisper-feature step.
      - name: tests (core + capture + transcribe crates, Windows)
        run: cargo test -p vault_buddy_core -p vault_buddy_capture -p vault_buddy_transcribe
        working-directory: src-tauri
      - name: tests (transcribe crate, whisper feature, Windows)
        run: cargo test -p vault_buddy_transcribe --features whisper
        working-directory: src-tauri
      - name: Upload Windows installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vault-buddy-windows-${{ github.sha }}
          # Must track the job-level CARGO_TARGET_DIR override above — the
          # bundles land under it, not src-tauri/target. if-no-files-found:
          # error is the tripwire if these two ever drift apart again.
          path: |
            C:/vbt/release/bundle/msi/*.msi
            C:/vbt/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  linux-app:
    name: Linux app (compile gate)
    runs-on: ubuntu-latest
    needs: [frontend, rust-core]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, pinned 2026-07-10
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: linux-app
      - name: Install Linux GUI/build system deps
        run: bash scripts/setup-linux-deps.sh
      - run: npm ci
      # Compile gate only: --no-bundle links the whole app and runs Tauri's
      # codegen + capability checks but produces no installer, and
      # createUpdaterArtifacts:false means no signing secret is referenced
      # (runs identically on forks). This closes the loop that previously only
      # the windows-app job could — a shell compile error now fails here, fast
      # and in parallel with Windows. The Linux build is never released.
      - name: Compile the Tauri shell (no bundle)
        run: npx tauri build --no-bundle --config '{"bundle":{"createUpdaterArtifacts":false}}'
      # The shell's own quality gates live here, not in rust-core: the shell
      # crate needs the WebView/GTK system libs installed above, and
      # generate_context! embeds ../dist, which the tauri build step just
      # produced. Before this, the shell's 11 unit tests (including the
      # catch_job_survives_a_panicking_job regression test) ran in NO CI job
      # and clippy never saw the shell (docs/Gaps.md GAP-40/GAP-43).
      - name: clippy (whole workspace, incl. shell)
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: src-tauri
      - name: tests (shell crate)
        run: cargo test -p vault-buddy --lib
        working-directory: src-tauri
